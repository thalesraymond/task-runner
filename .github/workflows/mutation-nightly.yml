name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Stryker Incremental File
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: ${{ runner.os }}-stryker-incremental-refs/heads/main

      - name: Run mutation tests
        run: pnpm mutate

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/mutation.html

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = `Nightly Mutation Testing Failed: ${new Date().toISOString().split('T')[0]}`;
            const issueBody = `The nightly mutation testing job has failed.\n\nPlease check the workflow run and the artifact uploaded to view the report.\n\nWorkflow Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['bug']
            });
