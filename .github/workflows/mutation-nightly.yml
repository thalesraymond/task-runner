name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Stryker Incremental File
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: ${{ runner.os }}-stryker-incremental-refs/heads/main

      - name: Run mutation tests
        run: pnpm mutate

      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/

      - name: Report Mutation Results
        id: global-report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const label = 'mutation-report';
            const reportPath = 'reports/mutation/mutation.json';
            const apiVersion = '2026-03-10';
            const commonHeaders = { 'X-GitHub-Api-Version': apiVersion };

            let survivors = 0;
            let totalMutants = 0;
            let reportExists = false;
            let mutationScore = 0;

            if (fs.existsSync(reportPath)) {
              try {
                const reportData = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                reportExists = true;
                
                for (const file in reportData.files) {
                  reportData.files[file].mutants.forEach(mutant => {
                    totalMutants++;
                    if (mutant.status === 'Survived' || mutant.status === 'NoCoverage') {
                      survivors++;
                    }
                  });
                }
                
                // Calculate mutation score if possible
                const killed = totalMutants - survivors;
                mutationScore = totalMutants > 0 ? ((killed / totalMutants) * 100).toFixed(2) : 0;
              } catch (e) {
                console.error('Error parsing report:', e);
                reportExists = false;
              }
            }

            // Find existing issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label],
              state: 'open',
              headers: commonHeaders
            });

            // Decide if we need to create/update an issue
            // We report if there are survivors OR if the report doesn't exist (failed run)
            if (survivors === 0 && reportExists) {
              console.log('No surviving mutations found. Checking for existing issue to close.');
              
              if (issues.data.length > 0) {
                const issueNumber = issues.data[0].number;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `Fixed: All mutations are now covered/killed! \n\nWorkflow Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  headers: commonHeaders
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  headers: commonHeaders
                });
                core.setOutput('issue-number', issueNumber);
              }
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const issueTitle = reportExists 
              ? `Mutation Testing Report: ${survivors} survivors (${mutationScore}%)`
              : `Mutation Testing Failed: Execution Error`;
            
            const issueBody = reportExists
              ? `### Mutation Testing Report - ${date}\n\n` +
                `- **Surviving Mutants:** ${survivors}\n` +
                `- **Total Mutants:** ${totalMutants}\n` +
                `- **Mutation Score:** ${mutationScore}%\n\n` +
                `Please download the \`mutation-report\` artifact from the workflow run to view the full HTML report.\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              : `### Mutation Testing Failed - ${date}\n\n` +
                `The mutation testing job failed to produce a report. This usually indicates a crash or a configuration error.\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let issueNumber;
            if (issues.data.length > 0) {
              issueNumber = issues.data[0].number;
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                title: issueTitle,
                body: issueBody,
                headers: commonHeaders
              });
              console.log(`Updated issue #${issueNumber}`);
            } else {
              const result = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: [label, 'bug'],
                headers: commonHeaders
              });
              issueNumber = result.data.number;
              console.log(`Created new issue #${issueNumber}`);
            }
            core.setOutput('issue-number', issueNumber);

      - name: Report Individual Mutations
        if: always() && steps.global-report.outputs.issue-number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/mutation/mutation.json';
            const parentIssueNumber = parseInt('${{ steps.global-report.outputs.issue-number }}');
            const label = 'mutant';
            const apiVersion = '2026-03-10';
            const commonHeaders = { 'X-GitHub-Api-Version': apiVersion };

            if (!fs.existsSync(reportPath)) {
              console.log('No mutation report found. Skipping individual issues.');
              return;
            }

            let reportData;
            try {
              reportData = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            } catch (e) {
              console.error('Error parsing report:', e);
              return;
            }

            const currentSurvivors = [];
            for (const filePath in reportData.files) {
              const file = reportData.files[filePath];
              file.mutants.forEach(mutant => {
                if (mutant.status === 'Survived' || mutant.status === 'NoCoverage') {
                  currentSurvivors.push({
                    filePath,
                    mutant
                  });
                }
              });
            }

            // Get all open mutant issues
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label],
              state: 'open',
              headers: commonHeaders
            });

            const survivorMap = new Map();
            currentSurvivors.forEach(s => {
              // Title includes file, line, and mutator for unique identification
              const title = `[Mutant] ${s.filePath}:${s.mutant.location.start.line} - ${s.mutant.mutatorName}`;
              survivorMap.set(title, s);
            });

            // Handle survivors
            for (const [title, s] of survivorMap) {
              const existing = existingIssues.find(i => i.title === title);
              const body = `### Surviving Mutant Details\n\n` +
                `- **File:** \`${s.filePath}\`\n` +
                `- **Line:** ${s.mutant.location.start.line}\n` +
                `- **Mutator:** ${s.mutant.mutatorName}\n` +
                `- **Status:** ${s.mutant.status}\n` +
                `- **Replacement:** \`${s.mutant.replacement.replace(/`/g, '\\`').substring(0, 1000)}\`\n\n` +
                `**Parent Issue:** #${parentIssueNumber}\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              if (existing) {
                // Update existing issue if needed (e.g. to keep it fresh or link to new run)
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: body,
                  headers: commonHeaders
                });
                console.log(`Updated mutant issue #${existing.number}`);
              } else {
                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body,
                  labels: [label, 'bug'],
                  headers: commonHeaders
                });
                console.log(`Created mutant issue #${newIssue.data.number}`);
              }
            }

            // Close issues for mutants that no longer exist
            for (const issue of existingIssues) {
              if (!survivorMap.has(issue.title)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Fixed: Mutant is no longer present in the latest report. \n\nWorkflow Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  headers: commonHeaders
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  headers: commonHeaders
                });
                console.log(`Closed mutant issue #${issue.number}`);
              }
            }


