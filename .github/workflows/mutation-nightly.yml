name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Stryker Incremental File
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: ${{ runner.os }}-stryker-incremental-refs/heads/main

      - name: Run mutation tests
        run: pnpm mutate

      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/

      - name: Report Mutation Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const label = 'mutation-report';
            const reportPath = 'reports/mutation/mutation.json';
            let survivors = 0;
            let totalMutants = 0;
            let reportExists = false;
            let mutationScore = 0;

            if (fs.existsSync(reportPath)) {
              try {
                const reportData = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                reportExists = true;
                
                for (const file in reportData.files) {
                  reportData.files[file].mutants.forEach(mutant => {
                    totalMutants++;
                    if (mutant.status === 'Survived' || mutant.status === 'NoCoverage') {
                      survivors++;
                    }
                  });
                }
                
                // Calculate mutation score if possible
                const killed = totalMutants - survivors;
                mutationScore = totalMutants > 0 ? ((killed / totalMutants) * 100).toFixed(2) : 0;
              } catch (e) {
                console.error('Error parsing report:', e);
                reportExists = false;
              }
            }

            // Decide if we need to create/update an issue
            // We report if there are survivors OR if the report doesn't exist (failed run)
            if (survivors === 0 && reportExists) {
              console.log('No surviving mutations found. Checking for existing issue to close.');
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [label],
                state: 'open'
              });
              
              if (issues.data.length > 0) {
                const issueNumber = issues.data[0].number;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `Fixed: All mutations are now covered/killed! \n\nWorkflow Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
              }
              return;
            }

            // Find existing issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label],
              state: 'open'
            });

            const date = new Date().toISOString().split('T')[0];
            const issueTitle = reportExists 
              ? `Mutation Testing Report: ${survivors} survivors (${mutationScore}%)`
              : `Mutation Testing Failed: Execution Error`;
            
            const issueBody = reportExists
              ? `### Mutation Testing Report - ${date}\n\n` +
                `- **Surviving Mutants:** ${survivors}\n` +
                `- **Total Mutants:** ${totalMutants}\n` +
                `- **Mutation Score:** ${mutationScore}%\n\n` +
                `Please download the \`mutation-report\` artifact from the workflow run to view the full HTML report.\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              : `### Mutation Testing Failed - ${date}\n\n` +
                `The mutation testing job failed to produce a report. This usually indicates a crash or a configuration error.\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            if (issues.data.length > 0) {
              const issueNumber = issues.data[0].number;
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                title: issueTitle,
                body: issueBody
              });
              console.log(`Updated issue #${issueNumber}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: [label, 'bug']
              });
              console.log('Created new issue');
            }

