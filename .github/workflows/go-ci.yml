name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

jobs:
  build:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: cd go && go build ./...

      - name: Test
        run: cd go && go test -coverprofile=coverage.out ./...

      - name: Vet
        run: cd go && go vet ./...

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: go
