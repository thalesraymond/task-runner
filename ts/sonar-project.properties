sonar.projectKey=thalesraymond_task-runner-ts
sonar.organization=thalesraymond
sonar.projectName=task-runner (TypeScript)

# Sources and tests (relative to this file's directory = ts/)
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=ts

# Exclusions
sonar.cpd.exclusions=tests/**/*
sonar.coverage.exclusions=tests/**/*

# Coverage and reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.junit.reportPaths=test-report.xml

# Encoding
sonar.sourceEncoding=UTF-8
