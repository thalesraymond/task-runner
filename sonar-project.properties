# Root sonar-project.properties
#
# This file is intentionally NOT used by any scanner.
# SonarQube scans are configured per sub-project:
#
#   TypeScript: ts/sonar-project.properties  (project key: thalesraymond_task-runner-ts)
#   Go:         go/sonar-project.properties  (project key: thalesraymond_task-runner-go)
#
# Each CI workflow passes `projectBaseDir` pointing to the respective sub-directory,
# so the scanner picks up that sub-directory's sonar-project.properties file.
