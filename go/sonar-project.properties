sonar.projectKey=thalesraymond_task-runner-go
sonar.organization=thalesraymond
sonar.projectName=task-runner (Go)

# Sources (relative to this file's directory = go/)
# Excludes the cmd entry-point directory from duplication checks; adjust if needed
sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**

# Tests
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage
# The go test -coverprofile=coverage.out ./... output is relative to go/
sonar.go.coverage.reportPaths=coverage.out

# Encoding
sonar.sourceEncoding=UTF-8
